services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edurag
      POSTGRES_PASSWORD: edurag
      POSTGRES_DB: edurag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  
volumes:
  postgres_data:
  qdrant_data: